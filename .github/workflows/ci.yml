name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: |
          pip install black==24.2.0 flake8==7.0.0
      - name: Run black
        run: black --check src/ tests/ scripts/
      - name: Run flake8
        run: flake8 src/ tests/ scripts/ --max-line-length=100

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  accuracy-gate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Train models
        run: python scripts/train_all.py
      - name: Run accuracy gate tests
        run: python tests/test_accuracy_gate.py

  smoke-test:
    needs: accuracy-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run smoke test
        run: timeout 60 python scripts/smoke_test.py

  auto-commit-reports:
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit reports and changelog
        run: |
          git add reports/ CHANGELOG.md || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update evaluation reports [skip ci]"
            git push
          fi

