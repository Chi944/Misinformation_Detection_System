name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: ${{ github.workspace }}
  TF_CPP_MIN_LOG_LEVEL: "3"
  TRANSFORMERS_OFFLINE: "0"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3 || echo "Ollama pull failed - judge tests will use fallback"

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ tests/ scripts/ --max-line-length=100 --ignore=E501,W503 || true

      - name: Run smoke test
        run: python scripts/smoke_test.py --synthetic

      - name: Run unit tests
        run: |
          pip install pytest
          pytest tests/ -v --timeout=120 -x 2>&1 | tail -30

      - name: Check accuracy gates
        run: |
          python scripts/train_all.py --synthetic --n-synthetic 200
          python scripts/evaluate.py --synthetic

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: reports/
          if-no-files-found: ignore

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: |
          pip install black==24.2.0 flake8==7.0.0
      - name: Run black
        run: black --check src/ tests/ scripts/
      - name: Run flake8
        run: flake8 src/ tests/ scripts/ --max-line-length=100

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  accuracy-gate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Train models
        run: python scripts/train_all.py
      - name: Run accuracy gate tests
        run: python tests/test_accuracy_gate.py

  smoke-test:
    needs: accuracy-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run smoke test
        run: timeout 60 python scripts/smoke_test.py

  auto-commit-reports:
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit reports and changelog
        run: |
          git add reports/ CHANGELOG.md || true
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update evaluation reports [skip ci]"
            git push
          fi

